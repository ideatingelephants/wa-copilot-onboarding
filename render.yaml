services:
  - name: wa-ops-copilot-worker
    type: worker
    runtime: node
    region: singapore
    plan: starter
    autoDeployTrigger: "off"
    buildCommand: npm install
    preDeployCommand: npm run db:init
    startCommand: npm start
    disk:
      name: auth-data
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: wa-ops-db
          property: connectionString
      - key: AUTH_DIR
        value: /var/data/auth
      - key: OWNER_PHONE
        sync: false
      - key: OWNER_JID
        value: ""
      - key: LOG_LEVEL
        value: info
      - key: TIMEZONE
        value: Asia/Kolkata
      - key: ENABLE_LLM_CLASSIFIER
        value: "0"
      - key: LLM_PROVIDER
        value: gemini
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: GCP_PROJECT_ID
        value: ""
      - key: GCP_LOCATION
        value: us-central1
      - key: GEMINI_MODEL
        value: gemini-2.0-flash-001

databases:
  - name: wa-ops-db
    plan: free
    databaseName: wa_ops_copilot
    user: wa_ops_user
